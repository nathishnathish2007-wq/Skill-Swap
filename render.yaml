services:
  - type: web
    name: skillswap-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_MODE
        value: mongo
      - key: SEED_DEMO_DATA
        value: "true"
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
